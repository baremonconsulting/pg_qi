name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: PostgreSQL ${{ matrix.postgresql }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        postgresql:
          - "16"
          - "17"
          - "18"

    env:
      PG_MAJOR: ${{ matrix.postgresql }}
      PG_CONFIG: /usr/lib/postgresql/${{ matrix.postgresql }}/bin/pg_config

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add the PostgreSQL APT repository
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ca-certificates curl gnupg lsb-release
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          curl --fail --silent --show-error \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor --yes -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

      - name: Install PostgreSQL and build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            postgresql-${PG_MAJOR} \
            postgresql-server-dev-${PG_MAJOR}

      - name: Build
        run: make

      - name: Install extension
        run: sudo --preserve-env=PG_CONFIG make install

      - name: Initialise and start PostgreSQL
        shell: bash
        run: |
          set -euxo pipefail

          PGBIN="$(dirname "${PG_CONFIG}")"
          PGDATA="${RUNNER_TEMP}/pgdata-${PG_MAJOR}"
          PGHOST="${RUNNER_TEMP}/pgsocket-${PG_MAJOR}"
          PGPORT="55432"
          PGLOG="${RUNNER_TEMP}/postgresql-${PG_MAJOR}.log"

          mkdir -p "${PGHOST}"

          {
            echo "PGBIN=${PGBIN}"
            echo "PGDATA=${PGDATA}"
            echo "PGHOST=${PGHOST}"
            echo "PGPORT=${PGPORT}"
            echo "PGUSER=${USER}"
            echo "PGLOG=${PGLOG}"
          } >> "${GITHUB_ENV}"

          "${PGBIN}/initdb" \
            --pgdata="${PGDATA}" \
            --username="${USER}" \
            --auth-local=trust \
            --auth-host=trust \
            --no-sync

          "${PGBIN}/pg_ctl" \
            -D "${PGDATA}" \
            -l "${PGLOG}" \
            -o "-k ${PGHOST} -p ${PGPORT}" \
            -w start

          "${PGBIN}/pg_isready" \
            --host="${PGHOST}" \
            --port="${PGPORT}"

          "${PGBIN}/psql" \
            --dbname=postgres \
            --command='SELECT version();'

      - name: Run regression tests
        run: make installcheck

      - name: Show failure diagnostics
        if: failure()
        shell: bash
        run: |
          echo "=== Regression differences ==="
          cat regression.diffs 2>/dev/null || true

          echo "=== PostgreSQL log ==="
          if [[ -n "${PGLOG:-}" ]]; then
            cat "${PGLOG}" 2>/dev/null || true
          fi

      - name: Stop PostgreSQL
        if: always()
        shell: bash
        run: |
          if [[ -n "${PGDATA:-}" && -f "${PGDATA}/postmaster.pid" ]]; then
            "${PGBIN}/pg_ctl" \
              -D "${PGDATA}" \
              -m fast \
              -w stop
          fi
