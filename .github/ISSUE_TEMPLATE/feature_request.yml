name: Feature request
description: Propose an improvement to pg_qi
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational or technical problem should be solved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behaviour and any PostgreSQL integration points.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      options:
        - I may be able to implement this
        - I can help test this
        - I am reporting the requirement only
    validations:
      required: true
